<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영단어 마스터</title>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Confetti JS -->
  <script src="https://cdn.jsdelivr.net/npm/confetti-js@0.0.18/dist/index.min.js"></script>

  <style>
    /* index.css */
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg: #f3f4f6;
      --card-bg: #ffffff;
      --text: #1f2937;
      --text-light: #6b7280;
      --success: #10b981;
      --error: #ef4444;
    }

    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* App.css */
    .container {
      background-color: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 500px;
      padding: 30px;
      text-align: center;
      margin: 20px;
    }

    h1 {
      color: var(--primary);
      margin-bottom: 20px;
      font-size: 1.8rem;
    }

    h2 {
      font-size: 1.2rem;
      color: var(--text-light);
      margin-bottom: 20px;
    }

    button {
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      width: 100%;
      margin-top: 10px;
    }

    .btn:hover {
      background-color: var(--primary-hover);
    }

    .btn:disabled {
      background-color: #9ca3af;
      cursor: not-allowed;
    }

    .btn-outline {
      background-color: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }

    .btn-outline:hover {
      background-color: #eef2ff;
    }

    input[type="text"] {
      width: calc(100% - 24px);
      padding: 12px;
      margin-bottom: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
    }

    .flashcard {
      padding: 40px 20px;
      background: #fdfdfd;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      margin-bottom: 20px;
    }

    .flashcard .word {
      font-size: 2rem;
      font-weight: bold;
      color: var(--primary);
      display: block;
      margin-bottom: 10px;
    }

    .flashcard .meaning {
      font-size: 1.5rem;
      color: var(--text);
      display: block;
    }

    .progress-container {
      width: 100%;
      background-color: #e5e7eb;
      border-radius: 999px;
      height: 6px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background-color: var(--primary);
      width: 0%;
      transition: width 0.3s;
    }

    .feedback {
      margin-top: 15px;
      font-weight: bold;
      font-size: 1.1rem;
      min-height: 1.5rem;
    }

    .feedback.correct {
      color: var(--success);
    }

    .feedback.wrong {
      color: var(--error);
    }

    /* Class Selection Styles */
    .class-list {
      list-style: none;
      padding: 0;
      margin: 20px 0;
      max-height: 300px;
      overflow-y: auto;
    }

    .class-item {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .class-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      border-color: var(--primary);
    }

    .class-info strong {
      display: block;
      font-size: 1.1rem;
      color: var(--text);
    }

    .class-info span {
      font-size: 0.9rem;
      color: var(--text-light);
    }

    /* Additional Utility for List */
    ul::-webkit-scrollbar {
      width: 6px;
    }

    ul::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ul::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 3px;
    }

    ul::-webkit-scrollbar-thumb:hover {
      background: #aaa;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Icons ---

    const UserCircle = ({ size = 24, color = "currentColor", ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
        <circle cx="12" cy="12" r="10" />
        <circle cx="12" cy="10" r="3" />
        <path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662" />
      </svg>
    );

    const Trash2 = ({ size = 24, color = "currentColor", ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
        <path d="M3 6h18" />
        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
        <line x1="10" y1="11" x2="10" y2="17" />
        <line x1="14" y1="11" x2="14" y2="17" />
      </svg>
    );

    const Volume2 = ({ size = 24, color = "currentColor", ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
      </svg>
    );

    const BookOpen = ({ size = 24, color = "currentColor", ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
      </svg>
    );

    const PlusCircle = ({ size = 24, color = "currentColor", ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="16" />
        <line x1="8" y1="12" x2="16" y2="12" />
      </svg>
    );

    // --- Components ---

    function Login({ onLogin }) {
      const [name, setName] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (name.trim()) {
          onLogin(name.trim());
        }
      };

      return (
        <div className="section">
          <div style={{ marginBottom: '20px' }}>
            <UserCircle size={64} color="#4f46e5" />
          </div>
          <h2>환영합니다! 이름을 입력해주세요.</h2>
          <form onSubmit={handleSubmit}>
            <input
              type="text"
              placeholder="이름 (예: 길동이)"
              value={name}
              onChange={(e) => setName(e.target.value)}
              autoFocus
            />
            <button type="submit" className="btn">시작하기</button>
          </form>
        </div>
      );
    }

    function ClassSelectionPhase({ classes, onCreateClass, onSelectClass }) {
      const [isCreating, setIsCreating] = useState(false);
      const [newClassName, setNewClassName] = useState('');

      const handleCreate = (e) => {
        e.preventDefault();
        if (newClassName.trim()) {
          onCreateClass(newClassName.trim());
          setNewClassName('');
          setIsCreating(false);
        }
      };

      if (isCreating) {
        return (
          <div>
            <h2>새 클래스 만들기</h2>
            <form onSubmit={handleCreate}>
              <input
                type="text"
                placeholder="클래스 이름"
                value={newClassName}
                onChange={(e) => setNewClassName(e.target.value)}
                autoFocus
              />
              <button type="submit" className="btn">클래스 생성</button>
              <button type="button" className="btn btn-outline" onClick={() => setIsCreating(false)}>취소</button>
            </form>
          </div>
        );
      }

      return (
        <div>
          <h2>학습할 클래스를 선택하거나 만드세요.</h2>

          <button className="btn" onClick={() => setIsCreating(true)} style={{ marginBottom: '20px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px' }}>
            <PlusCircle size={20} />
            새 클래스 만들기
          </button>

          <div style={{ textAlign: 'left', marginBottom: '10px', color: '#6b7280', fontSize: '0.9rem' }}>내 클래스 목록 ({classes.length})</div>

          <ul className="class-list">
            {classes.length === 0 ? (
              <li style={{ textAlign: 'center', color: '#9ca3af', padding: '20px' }}>
                생성된 클래스가 없습니다.<br />새로 만들어보세요!
              </li>
            ) : (
              classes.map(cls => (
                <li key={cls.id} className="class-item" onClick={() => onSelectClass(cls.id)}>
                  <div className="class-info">
                    <strong>{cls.name}</strong>
                    <span>단어 {cls.words.length}개</span>
                  </div>
                  <BookOpen size={20} color="#4f46e5" />
                </li>
              ))
            )}
          </ul>
        </div>
      );
    }

    function InputPhase({ className, words, updateWords, onStartMemorize, onStartQuiz, onBack }) {
      const [word, setWord] = useState('');
      const [meaning, setMeaning] = useState('');
      const meaningInputRef = useRef(null);
      const wordInputRef = useRef(null);

      const addWord = () => {
        if (word.trim() && meaning.trim()) {
          updateWords([...words, { word: word.trim(), meaning: meaning.trim() }]);
          setWord('');
          setMeaning('');
          wordInputRef.current.focus();
        }
      };

      const deleteWord = (index) => {
        const newWords = [...words];
        newWords.splice(index, 1);
        updateWords(newWords);
      };

      const handleWordEnter = (e) => {
        if (e.key === 'Enter') meaningInputRef.current.focus();
      };

      const handleMeaningEnter = (e) => {
        if (e.key === 'Enter') addWord();
      };

      return (
        <div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '20px' }}>
            <button onClick={onBack} style={{ background: 'none', border: 'none', color: '#6b7280', display: 'flex', alignItems: 'center', padding: 0 }}>
              ← 클래스 선택
            </button>
            <h2 style={{ margin: 0, color: '#4f46e5' }}>{className}</h2>
            <div style={{ width: '80px' }}></div> {/* Spacer */}
          </div>

          <input
            type="text"
            placeholder="단어"
            value={word}
            onChange={(e) => setWord(e.target.value)}
            onKeyPress={handleWordEnter}
            ref={wordInputRef}
          />
          <input
            type="text"
            placeholder="뜻"
            value={meaning}
            onChange={(e) => setMeaning(e.target.value)}
            onKeyPress={handleMeaningEnter}
            ref={meaningInputRef}
          />
          <button className="btn btn-outline" onClick={addWord}>추가하기</button>

          <ul style={{ listStyle: 'none', padding: 0, margin: '20px 0', textAlign: 'left', maxHeight: '200px', overflowY: 'auto' }}>
            {words.length === 0 ? (
              <li style={{ color: '#9ca3af', textAlign: 'center' }}>아직 등록된 단어가 없습니다.</li>
            ) : (
              words.map((item, idx) => (
                <li key={idx} style={{ padding: '10px', borderBottom: '1px solid #f3f4f6', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div>
                    <strong>{item.word}</strong> - {item.meaning}
                  </div>
                  <button
                    onClick={() => deleteWord(idx)}
                    style={{ background: '#fee2e2', color: '#ef4444', border: 'none', borderRadius: '4px', padding: '4px 8px', cursor: 'pointer' }}
                  >
                    <Trash2 size={16} />
                  </button>
                </li>
              ))
            )}
          </ul>

          <div style={{ display: 'flex', gap: '10px' }}>
            <button className="btn" onClick={onStartMemorize} style={{ flex: 1 }}>TTS 암기</button>
            <button className="btn" onClick={onStartQuiz} style={{ flex: 1, backgroundColor: '#10b981' }}>퀴즈 풀기</button>
          </div>
        </div>
      );
    }

    function MemorizePhase({ words, onFinish, onBack }) {
      const [index, setIndex] = useState(0);

      useEffect(() => {
        if (words.length > 0) {
          speak(words[index].word);
        }
      }, [index]);

      const speak = (text) => {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = 0.9;
        window.speechSynthesis.speak(u);
      };

      const next = () => {
        if (index < words.length - 1) {
          setIndex(index + 1);
        } else {
          alert("암기가 끝났습니다!");
          onFinish();
        }
      };

      const currentItem = words[index];

      return (
        <div>
          <h2>듣고 따라하며 암기하세요</h2>
          <div className="flashcard">
            <span className="word">{currentItem.word}</span>
            <span className="meaning">{currentItem.meaning}</span>
          </div>

          <button className="btn btn-outline" onClick={() => speak(currentItem.word)}>
            <Volume2 style={{ verticalAlign: 'middle', marginRight: '5px' }} />
            다시 듣기
          </button>

          <button className="btn" onClick={next}>다음 단어</button>

          <button className="btn btn-outline" onClick={onBack} style={{ marginTop: '20px', borderColor: '#9ca3af', color: '#6b7280' }}>
            목록으로 돌아가기
          </button>
        </div>
      );
    }

    function QuizPhase({ words, type, onComplete, onBack }) {
      const [queue, setQueue] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [wrongAnswers, setWrongAnswers] = useState([]);
      const [feedback, setFeedback] = useState(null); // { text, type }
      const [options, setOptions] = useState([]);
      const [typingInput, setTypingInput] = useState('');

      const speak = (text) => {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = 0.9;
        window.speechSynthesis.speak(u);
      };

      useEffect(() => {
        const shuffled = [...words].sort(() => Math.random() - 0.5);
        setQueue(shuffled);
      }, []);

      useEffect(() => {
        if (queue.length > 0 && currentIndex < queue.length) {
          prepareQuestion();
        } else if (queue.length > 0 && currentIndex >= queue.length) {
          onComplete(score, wrongAnswers, queue.length);
        }
      }, [queue, currentIndex]);

      const prepareQuestion = () => {
        setFeedback(null);
        setTypingInput('');
        const current = queue[currentIndex];

        if (type === 'word-to-meaning' || type === 'listening-to-meaning') {
          speak(current.word);
        }

        if (type !== 'typing') {
          let distractors = words.filter(w => w.word !== current.word);
          distractors = distractors.sort(() => Math.random() - 0.5).slice(0, 3);
          let opts = [current, ...distractors];
          opts.sort(() => Math.random() - 0.5);
          setOptions(opts);
        }
      };

      const handleOptionClick = (selected) => {
        if (feedback) return;
        const current = queue[currentIndex];
        const isCorrect = selected.word === current.word;
        processAnswer(isCorrect, current);
      };

      const handleTypingSubmit = (e) => {
        e.preventDefault();
        if (feedback) return;
        const current = queue[currentIndex];
        const isCorrect = typingInput.trim().toLowerCase() === current.word.toLowerCase();
        processAnswer(isCorrect, current);
      };

      const processAnswer = (isCorrect, item) => {
        if (isCorrect) {
          setScore(s => s + 1);
          setFeedback({ text: '⭕ 정답입니다!', type: 'correct' });
          speak("Correct");
        } else {
          setWrongAnswers(w => [...w, item]);
          setFeedback({ text: `❌ 틀렸습니다. 정답은 '${item.word}' 입니다.`, type: 'wrong' });
          speak(`Wrong. The answer is ${item.word}`);
        }

        setTimeout(() => {
          setCurrentIndex(c => c + 1);
        }, 1500);
      };

      if (queue.length === 0) return <div>Loading...</div>;
      if (currentIndex >= queue.length) return <div>Calculating...</div>;

      const currentItem = queue[currentIndex];
      const progress = ((currentIndex) / queue.length) * 100;

      return (
        <div>
          <div className="progress-container">
            <div className="progress-bar" style={{ width: `${progress}%` }}></div>
          </div>

          <h2>
            {type === 'meaning-to-word' && `뜻: ${currentItem.meaning}`}
            {type === 'typing' && `뜻: ${currentItem.meaning}`}
            {type === 'word-to-meaning' && `단어: ${currentItem.word}`}
            {type === 'listening-to-meaning' && (
              <span style={{ cursor: 'pointer' }} onClick={() => speak(currentItem.word)}>
                <Volume2 style={{ verticalAlign: 'middle', marginRight: '5px' }} />
                잘 듣고 뜻을 고르세요 (클릭하여 다시 듣기)
              </span>
            )}
          </h2>

          {type === 'typing' ? (
            <form onSubmit={handleTypingSubmit}>
              <input
                type="text"
                placeholder="정답 입력"
                value={typingInput}
                onChange={e => setTypingInput(e.target.value)}
                autoFocus
              />
              <button type="submit" className="btn">제출</button>
            </form>
          ) : (
            <div>
              {options.map((opt, idx) => (
                <button key={idx} className="btn" style={{ backgroundColor: 'white', color: 'black', border: '1px solid #e5e7eb', marginBottom: '8px' }} onClick={() => handleOptionClick(opt)}>
                  {type === 'meaning-to-word' ? opt.word : opt.meaning}
                </button>
              ))}
            </div>
          )}

          {feedback && (
            <div className={`feedback ${feedback.type}`}>
              {feedback.text}
            </div>
          )}
        </div>
      );
    }

    function ResultPhase({ score, total, wrongAnswers, onRetryFull, onRetryWrong, onHome }) {
      const canvasRef = useRef(null);

      useEffect(() => {
        if (score === total) {
          const confettiSettings = { target: 'confetti-canvas' };
          const confetti = new ConfettiGenerator(confettiSettings);
          confetti.render();
          return () => confetti.clear();
        }
      }, [score, total]);

      return (
        <div>
          <canvas id="confetti-canvas" ref={canvasRef} style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: 'none', zIndex: 999 }}></canvas>

          <h2>학습 결과</h2>
          <div className="flashcard">
            <span className="word">{score} / {total}</span>
            <span className="meaning">
              {score === total ? "완벽해요! 🎉" :
                score >= total * 0.8 ? "훌륭합니다! 👍" : "더 노력해보세요! 💪"}
            </span>
          </div>

          {wrongAnswers.length > 0 && (
            <button className="btn btn-outline" onClick={onRetryWrong}>
              ❌ 틀린 문제 다시 풀기 ({wrongAnswers.length}개)
            </button>
          )}

          <button className="btn" onClick={onRetryFull}>🔄 같은 퀴즈 다시하기</button>
          <button className="btn btn-outline" onClick={onHome}>🏠 목록으로</button>
        </div>
      );
    }

    function App() {
      const [user, setUser] = useState(localStorage.getItem('word_app_user') || null);
      // Phases: LOGIN, CLASS_SELECT, INPUT, MEMORIZE, QUIZ_SELECT, QUIZ, RESULT
      const [phase, setPhase] = useState(user ? 'CLASS_SELECT' : 'LOGIN');

      // Class System State
      const [classes, setClasses] = useState(() => {
        const saved = localStorage.getItem('word_app_classes');
        let initialClasses = saved ? JSON.parse(saved) : [];

        // Migrate legacy data if valid and no classes exist
        if (initialClasses.length === 0) {
          const legacyWords = localStorage.getItem('word_app_words');
          if (legacyWords) {
            try {
              const parsedWords = JSON.parse(legacyWords);
              if (parsedWords.length > 0) {
                initialClasses.push({
                  id: 'legacy_' + Date.now(),
                  name: '기본 단어장',
                  words: parsedWords,
                  createdAt: Date.now()
                });
              }
            } catch (e) {
              console.error("Legacy data migration failed", e);
            }
          }
        }
        return initialClasses;
      });

      const [currentClassId, setCurrentClassId] = useState(null);

      // Quiz State
      const [quizType, setQuizType] = useState('meaning-to-word');
      const [quizSubset, setQuizSubset] = useState(null);
      const [lastResult, setLastResult] = useState(null);

      // Persistence
      useEffect(() => {
        if (user) localStorage.setItem('word_app_user', user);
        else localStorage.removeItem('word_app_user');
      }, [user]);

      useEffect(() => {
        localStorage.setItem('word_app_classes', JSON.stringify(classes));
      }, [classes]);

      // Handlers
      const handleLogin = (name) => {
        setUser(name);
        setPhase('CLASS_SELECT');
      };

      const handleLogout = () => {
        if (confirm("정말 로그아웃 하시겠습니까?")) {
          setUser(null);
          setPhase('LOGIN');
          setCurrentClassId(null);
        }
      };

      // Class Handlers
      const handleCreateClass = (name) => {
        const newClass = {
          id: 'class_' + Date.now(),
          name: name,
          words: [],
          createdAt: Date.now()
        };
        setClasses([...classes, newClass]);
        setCurrentClassId(newClass.id);
        setPhase('INPUT');
      };

      const handleSelectClass = (id) => {
        setCurrentClassId(id);
        setPhase('INPUT');
      };

      const updateCurrentClassWords = (newWords) => {
        setClasses(classes.map(cls =>
          cls.id === currentClassId ? { ...cls, words: newWords } : cls
        ));
      };

      // Get current class object
      const currentClass = classes.find(c => c.id === currentClassId);
      const currentWords = currentClass ? currentClass.words : [];

      // Quiz Handlers
      const startQuiz = (type, subset = null) => {
        if (currentWords.length < 4 && !subset) {
          alert("퀴즈를 풀려면 최소 4개의 단어가 필요합니다.");
          return;
        }
        setQuizType(type);
        setQuizSubset(subset);
        setPhase('QUIZ');
      };

      const handleQuizComplete = (score, wrongAnswers, total) => {
        setLastResult({ score, wrongAnswers, total });
        setPhase('RESULT');
      };

      return (
        <div className="container">
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' }}>
            <h1>🎓 영단어 마스터 {user && <span style={{ fontSize: '0.6em', color: '#6b7280' }}>by {user}</span>}</h1>
            {user && <button onClick={handleLogout} style={{ fontSize: '0.8rem', padding: '5px 10px', background: '#ccc', border: 'none', borderRadius: '4px' }}>로그아웃</button>}
          </div>

          {phase === 'LOGIN' && <Login onLogin={handleLogin} />}

          {phase === 'CLASS_SELECT' && (
            <ClassSelectionPhase
              classes={classes}
              onCreateClass={handleCreateClass}
              onSelectClass={handleSelectClass}
            />
          )}

          {phase === 'INPUT' && currentClass && (
            <InputPhase
              className={currentClass.name}
              words={currentWords}
              updateWords={updateCurrentClassWords}
              onStartMemorize={() => setPhase('MEMORIZE')}
              onStartQuiz={() => setPhase('QUIZ_SELECT')}
              onBack={() => {
                setCurrentClassId(null);
                setPhase('CLASS_SELECT');
              }}
            />
          )}

          {phase === 'MEMORIZE' && (
            <MemorizePhase
              words={currentWords}
              onFinish={() => setPhase('INPUT')}
              onBack={() => setPhase('INPUT')}
            />
          )}

          {phase === 'QUIZ_SELECT' && (
            <div>
              <h2>어떤 퀴즈를 풀까요?</h2>
              <button className="btn" onClick={() => startQuiz('meaning-to-word')}>뜻 보고 단어 고르기 (기본)</button>
              <button className="btn" onClick={() => startQuiz('word-to-meaning')}>단어 보고 뜻 고르기</button>
              <button className="btn" onClick={() => startQuiz('listening-to-meaning')}>듣기 평가 (소리 듣고 뜻 고르기)</button>
              <button className="btn" onClick={() => startQuiz('typing')}>단어 직접 쓰기</button>
              <button className="btn btn-outline" onClick={() => setPhase('INPUT')}>뒤로 가기</button>
            </div>
          )}

          {phase === 'QUIZ' && (
            <QuizPhase
              words={quizSubset || currentWords}
              type={quizType}
              onComplete={handleQuizComplete}
              onBack={() => setPhase('INPUT')}
            />
          )}

          {phase === 'RESULT' && lastResult && (
            <ResultPhase
              score={lastResult.score}
              total={lastResult.total}
              wrongAnswers={lastResult.wrongAnswers}
              onRetryFull={() => startQuiz(quizType, quizSubset)}
              onRetryWrong={() => startQuiz(quizType, lastResult.wrongAnswers)}
              onHome={() => setPhase('INPUT')}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
